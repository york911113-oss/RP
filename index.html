<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RPG Battle Simulator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="overlay">

        <div class="container text-center">

            <h1>⚔️ RPG Battle Arena</h1>

            <h4>Defeat the Monster</h4>

            <hr>

            <div class="row mt-5">

                <div class="col">

                    <h2 id="playerName">🧙 Hero</h2>

                    <div class="hpBar">

                        <div id="playerBar"></div>

                    </div>

                    <h3 id="playerHP">100 / 100</h3>

                </div>

                <div class="col-2 d-flex align-items-center justify-content-center">

                    <h1>VS</h1>

                </div>

                <div class="col">

                    <h2>👹 Slime</h2>

                    <div class="hpBar">

                        <div id="enemyBar"></div>

                    </div>

                    <h3 id="enemyHP">100 / 100</h3>

                </div>

            </div>

            <div class="mt-5">

                <button id="attackBtn" class="btn btn-danger m-2">

                    ⚔️ Attack

                </button>

                <button id="healBtn" class="btn btn-success m-2">

                    🧪 Heal

                </button>
                <button id="defendBtn" class="btn btn-warning m-2">
                    🛡️ Defend
                </button>
                <button id="restartBtn" class="btn btn-primary m-2">

                    🔄 Restart

                </button>

            </div>

            <div class="log mt-5">

                <h3>Battle Log</h3>

                <ul id="battleLog"></ul>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
