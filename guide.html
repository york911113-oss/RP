<section class="hero">

    <h1>操作說明</h1>

    <div class="container text-start mt-5" style="max-width:700px;">

        <h4>⚔️ 攻擊</h4>

        <p>玩家每次攻擊會造成 <strong>10～30</strong> 點傷害。</p>

        <h4>💥 爆擊</h4>

        <p>有 <strong>20%</strong> 機率觸發爆擊，傷害提高為 <strong>30～50</strong> 點。</p>

        <h4>👹 怪物攻擊</h4>

        <p>怪物每回合會造成 <strong>20～40</strong> 點傷害，並有 <strong>25%</strong> 機率造成爆擊（35～55 點）。</p>

        <h4>❤️ 補血</h4>

        <p>每次補血可恢復 <strong>5～15</strong> 點生命值，但補血後怪物仍會立刻攻擊。</p>

        <h4>🏆 勝利條件</h4>

        <p>將怪物生命值降至 0 即可獲勝；玩家生命值降至 0 則遊戲失敗。</p>

    </div>

</section>
