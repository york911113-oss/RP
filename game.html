<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>開始模擬</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="index.html">

                RPG模擬器

            </a>

            <div class="collapse navbar-collapse show">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link" href="index.html">首頁</a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active" href="game.html">開始模擬</a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="guide.html">操作說明</a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="about.html">關於作品</a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <h1 class="text-center mb-5">

            開始模擬

        </h1>

        <div class="row text-center">

            <div class="col">

                <h2>🧙 玩家</h2>

                <div class="progress">

                    <div id="playerBar" class="progress-bar bg-success" style="width:100%">

                        100

                    </div>

                </div>

            </div>

            <div class="col">

                <h2>👹 怪物</h2>

                <div class="progress">

                    <div id="enemyBar" class="progress-bar bg-danger" style="width:100%">

                        100

                    </div>

                </div>

            </div>

        </div>

        <div class="text-center mt-5">

            <button id="attackBtn" class="btn btn-danger">

                攻擊

            </button>

            <button id="healBtn" class="btn btn-success">

                補血

            </button>

            <button id="restartBtn" class="btn btn-primary">

                重新開始

            </button>

        </div>
        <div id="message" class="alert alert-dark text-center mt-4">

            歡迎來到 RPG 模擬器！

        </div>

        <div class="mt-5">

            <h3>戰鬥紀錄</h3>

            <ul id="battleLog"></ul>

        </div>

    </div>

    <script src="js/game.js"></script>

</body>

</html>
